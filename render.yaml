services:
  # Node.js Express Backend
  - type: web
    name: healthcompass-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGO_URI
        sync: false
      - key: AI_SERVICE_URL
        value: "https://healthcompass-ai.onrender.com"
      - key: GEMINI_API_KEY
        sync: false

  # Python FastAPI Service
  - type: web
    name: healthcompass-ai
    env: python
    rootDir: ai-services
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
